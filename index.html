<head>

    <meta name="twitter:title" content="Conserva Tech Hub - Innovate Efficiently">

    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
      :root{
        --primary: #0F766E; /* teal-green */
        --secondary: #F5B301; /* gold */
        --accent: #14B8A6;
        --bg: #F6FFFA;
        --text: #0F172A;
        --muted: #475569;
        --card: #ffffff;
        --shadow: 0 12px 30px rgba(2, 6, 23, .08);
      }

      html, body { height: 100%; }
      body{
        font-family: 'Inter', sans-serif;
        background: radial-gradient(900px circle at 10% -10%, rgba(20,184,166,.14), transparent 55%), var(--bg);
        color: var(--text);
        scroll-behavior: smooth;
      }

      .container-max{max-width: 1200px;}

      /* Themed buttons */
      .btn-conserva{
        background: linear-gradient(180deg, rgba(245,179,1,1) 0%, rgba(235,165,0,1) 100%);
        border: 0;
        color: #0b1220;
        font-weight: 700;
        border-radius: 14px;
        padding: 0.85rem 1.2rem;
        box-shadow: 0 10px 22px rgba(245,179,1,.22);
      }
      .btn-conserva:hover{ filter: brightness(.96); transform: translateY(-1px); }

      .btn-conserva-outline{
        border: 2px solid rgba(20,184,166,.35);
        color: var(--primary);
        background: rgba(255,255,255,.75);
        font-weight: 700;
        border-radius: 14px;
        padding: 0.85rem 1.2rem;
      }
      .btn-conserva-outline:hover{ background: rgba(20,184,166,.08); border-color: rgba(20,184,166,.65); }

      /* Icon wrapper */
      .icon-tile{
        width: 54px; height: 54px;
        border-radius: 18px;
        display:flex; align-items:center; justify-content:center;
        background: rgba(15,118,110,.10);
        color: var(--primary);
        box-shadow: inset 0 0 0 1px rgba(20,184,166,.15);
      }
      .icon-tile.gold{ background: rgba(245,179,1,.12); color: #8a5a00; }
      .icon-tile.green{ background: rgba(20,184,166,.14); color: #0F766E; }

      /* Sections */
      .section-pad{ padding: 6.5rem 0; }

      /* Subtle floating cards */
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .animate-float{ animation: float 3.2s ease-in-out infinite; }
      .animate-float-delayed{ animation: float 4s ease-in-out 1.3s infinite; }
      .animate-float-slow{ animation: float 5.2s ease-in-out .6s infinite; }

      /* Card hover */
      .card-lift{ transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease; }
      .card-lift:hover{ transform: translateY(-3px); box-shadow: var(--shadow); border-color: rgba(20,184,166,.35) !important; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="components/Navbar.js"></script>
    <script type="text/babel" src="components/Hero.js"></script>
    <script type="text/babel" src="components/Solutions.js"></script>
    <script type="text/babel" src="components/SuccessStories.js"></script>
    <script type="text/babel" src="components/CTA.js"></script>
    <script type="text/babel" src="components/Footer.js"></script>
    <script type="text/babel" src="app.js"></script>

    <!-- Prevent layout shift on image loads -->
    <style>
      img{max-width:100%;height:auto;}
    </style>
</body>
</html>
