    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary-color: #0f172a; /* Deep Slate Blue */
            --secondary-color: #0ea5e9; /* Light Ocean Blue */
            --accent-color: #f59e0b; /* Amber */
            --bg-light: #f8fafc;
            --text-main: #334155;
        }
    }

    @layer base {
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-light);
            scroll-behavior: smooth;
        }
        h1, h2, h3, h4, h5, h6 {
            color: var(--primary-color);
        }
    }

    @layer utilities {
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        .animate-float-delayed {
            animation: float 4s ease-in-out 1.5s infinite;
        }
        .animate-float-slow {
            animation: float 5s ease-in-out 0.5s infinite;
        }
    }

    @layer components {
        .btn-primary {
            @apply px-6 py-3 bg-[var(--secondary-color)] text-white font-medium rounded-md hover:bg-blue-600 transition-colors shadow-sm;
        }
        .btn-outline {
            @apply px-6 py-3 border-2 border-[var(--primary-color)] text-[var(--primary-color)] font-medium rounded-md hover:bg-[var(--primary-color)] hover:text-white transition-colors;
        }
        .section-padding {
            @apply py-20 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto;
        }
    }
    </style>
